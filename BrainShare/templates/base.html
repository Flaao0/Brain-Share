<!doctype html>
<html>
  <head>
    <title>BrainShare</title>
  </head>
  <body>
    <header>
      <h1>BrainShare</h1>
      <nav>
        <a href="{% url 'notes:note_list' %}">Главная</a>
        | {% if user.is_authenticated %}
        <a href="{% url 'notes:add_note' %}">Добавить конспект</a>
        |
        <span>Привет, {{ user.username }}!</span>
        <form action="{% url 'logout' %}" method="post" style="display: inline">
          {% csrf_token %}
          <button
            type="submit"
            style="
              background: none;
              border: none;
              color: blue;
              cursor: pointer;
              text-decoration: underline;
              padding: 0;
              font-family: inherit;
              font-size: inherit;
            "
          >
            Выйти
          </button>
        </form>
        {% else %}
        <a href="{% url 'login' %}">Войти</a>
        |
        <a href="{% url 'register' %}">Регистрация</a>
        {% endif %}
      </nav>
    </header>
    <hr />
    <main>{% block content %} {% endblock %}</main>

    <hr />
    <footer>
      <p>Панель управления BrainShare, 2026</p>
    </footer>
  </body>
</html>
